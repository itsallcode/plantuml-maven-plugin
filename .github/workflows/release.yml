name: Release

on:
  workflow_dispatch:
    inputs:
      skip-deploy-maven-central:
        description: "Skip deployment to Maven Central"
        required: true
        type: boolean
        default: false
      auto-publish-maven-central:
        description: "Auto-publish to Maven Central"
        required: true
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: "bash"
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false
    permissions:
      contents: write # Required for creating GitHub release
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: true

      - name: Fail if not running on main branch
        if: ${{ github.ref != 'refs/heads/main' }}
        uses: actions/github-script@v9
        with:
          script: |
            core.setFailed('Not running on main branch, github.ref is ${{ github.ref }}. Please start this workflow only on main')

      - name: Set up Maven Central Repository
        uses: actions/setup-java@v5.3.0
        with:
          distribution: "temurin"
          java-version: 17
          cache: "maven"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build
        run: mvn --batch-mode -DossindexSkip=true clean install -DossindexSkip=true

      - name: List secret GPG keys
        run: gpg --list-secret-keys

      - name: Publish to Maven Central Repository
        if: ${{ !inputs.skip-deploy-maven-central }}
        run: |
          mvn --batch-mode deploy -Pcentral-publishing -DossindexSkip=true -DskipTests \
              -DcentralPublishingSkipPublishing=false \
              -DcentralPublishingAutoPublish=${AUTO_PUBLISH} \
              -DcentralPublishingDeploymentName="Deploy OFT Maven Plugin via release.yml"
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_PORTAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PORTAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
          AUTO_PUBLISH: ${{ inputs.auto-publish-maven-central }}

      - name: Create GitHub Release
        run: ./.github/workflows/github_release.sh
        env:
          GH_TOKEN: ${{ github.token }}
